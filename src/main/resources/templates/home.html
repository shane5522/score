<!DOCTYPE html>
<html lang="en" xmlns:th="http://thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
    <h1>성적 관리 프로그램</h1>
    <div class="score-container">
        <div th:each="score : ${score}">
            <a th:href="@{/score/contents(id=${score.id}}" th:text="${score.name}"></a>
        </div>
    </div>
</body>
</html>
